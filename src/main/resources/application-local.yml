spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/together_trip
    username: together_trip
    password: together_trip
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: 127.0.0.1
      port: 6379

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: local-development-secret-key-at-least-32-bytes
  issuer: together-trip
  access-token-expiration: 1800
  refresh-token-expiration: 1209600

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs